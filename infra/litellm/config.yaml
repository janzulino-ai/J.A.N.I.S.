model_list:
  - model_name: ollama/*
    litellm_params:
      model: ollama/*
      api_base: http://127.0.0.1:11434

  - model_name: openrouter/*
    litellm_params:
      model: openrouter/*
      api_key: os.environ/OPENROUTER_API_KEY

litellm_settings:
  drop_params: true
  set_verbose: false

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 2
  timeout: 120

environment_variables:
  OPENROUTER_API_KEY: ""
  LITELLM_MASTER_KEY: "sk-janis-local"

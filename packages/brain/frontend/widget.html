<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.N.I.C.E.</title>
    <link rel="stylesheet" href="/static/janis-theme.css">
    <link rel="stylesheet" href="/static/widget.css">
</head>
<body class="widget-body">
    <div class="widget-hud">
        <header class="widget-header">
            <div class="widget-header-left">
                <canvas id="widget-brain" class="widget-brain" width="64" height="64" aria-hidden="true"></canvas>
                <div>
                    <span class="widget-logo">J.A.N.I.C.E.</span>
                    <span id="widget-presence" class="widget-presence">widget</span>
                </div>
            </div>
            <span id="widget-status" class="widget-status offline">OFF</span>
        </header>
        <main id="widget-chat" class="widget-chat terminal-scroll"></main>
        <footer class="widget-footer">
            <span class="terminal-prompt">&gt;</span>
            <textarea id="widget-input" rows="2" placeholder="comando o messaggio…"></textarea>
            <button type="button" id="widget-send" class="widget-btn-primary">INVIA</button>
        </footer>
    </div>
    <script src="/static/vendor/three.min.js"></script>
    <script src="/static/janis-brain.js"></script>
    <script src="/static/widget.js"></script>
</body>
</html>

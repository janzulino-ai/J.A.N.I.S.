<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>J.A.N.I.S. Kiosk — JARVIS Preview</title>
  <link rel="stylesheet" href="static/server-infographic.css?v=jarvis01">
</head>
<body class="res-fhd">
  <div class="hud-bg-grid"></div>
  <div class="hud-scanline"></div>

  <div id="server-stage" class="glass-frame">
    <span class="hud-corner tl"></span>
    <span class="hud-corner tr"></span>
    <span class="hud-corner bl"></span>
    <span class="hud-corner br"></span>

    <div class="reactor-ring" aria-hidden="true">
      <svg viewBox="0 0 400 400">
        <circle cx="200" cy="200" r="180" class="ring-outer"/>
        <circle cx="200" cy="200" r="140" class="ring-mid"/>
        <circle cx="200" cy="200" r="100" class="ring-inner"/>
      </svg>
    </div>

    <header class="hud-head">
      <div class="head-left">
        <span class="logo">J.A.N.I.S.</span>
        <span class="sys-pill"><span class="pulse-dot"></span>ONLINE</span>
      </div>
      <span class="acronym">Just Another Neuralgic Improving Server</span>
      <div class="head-right">
        <span class="hud-tag">PREVIEW</span>
        <span id="hud-clock" class="hud-clock"></span>
      </div>
    </header>

    <main id="sheet-container"></main>

    <footer class="hud-foot">
      <span id="sheet-dots" class="sheet-dots"></span>
      <span class="foot-meta">CAROUSEL · 5 MODULES</span>
      <span id="pause-badge" class="pause-badge hidden">◆ PAUSA 10 MIN</span>
    </footer>
  </div>

  <script>
    const _fetch = window.fetch.bind(window);
    window.fetch = (url) => {
      if (url === "/api/host/metrics") {
        return Promise.resolve({
          json: () => Promise.resolve({
            hostname: "janis",
            platform: "Linux",
            uptime_sec: 86412,
            cpu: { usage_pct: 23, temp_c: 58 },
            memory: { usage_pct: 41 },
            gpu: { usage_pct: 12 },
          }),
        });
      }
      if (url === "/api/status") {
        return Promise.resolve({
          json: () => Promise.resolve({
            service: "JANIS",
            version: "2.0.0",
            session_messages: 14,
            connected_clients: ["pocket-iphone"],
            fleet: {
              nodes: [
                { node_id: "mac-node", online: false, info: "SSH offline" },
                { node_id: "win-vm", online: true, info: "VM HDMI RTX" },
                { node_id: "pocket", online: true, info: "iPhone 15 Pro Max" },
              ],
              nodes_online: 2,
            },
          }),
        });
      }
      return _fetch(url);
    };
  </script>
  <script src="static/server-stage.js?v=jarvis01"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>J.A.N.I.S. Server HUD</title>
  <link rel="stylesheet" href="/kiosk-static/server-infographic.css?v=hudcli08">
</head>
<body class="res-fhd hud-terminal hud-islands">
  <div class="hud-bg" aria-hidden="true"></div>
  <div class="hud-bg-grid" aria-hidden="true"></div>

  <div id="server-stage" class="hud-frame">
    <span class="hud-bracket tl"></span>
    <span class="hud-bracket tr"></span>
    <span class="hud-bracket bl"></span>
    <span class="hud-bracket br"></span>

    <header class="hud-head">
      <div class="head-left">
        <span class="logo">J.A.N.I.S.</span>
        <span class="sys-pill"><span class="pulse-ring"></span><span id="sys-status">ONLINE</span></span>
      </div>
      <div class="head-center">
        <span class="head-line"></span>
        <span class="acronym">Just Another Neuralgic Improving Server</span>
        <span class="head-line"></span>
      </div>
      <div class="head-right">
        <span class="hud-tag">SYS.HUD</span>
        <span id="hud-clock" class="hud-clock">00:00:00</span>
      </div>
    </header>

    <div class="hud-grid-wrap">
      <div id="hud-live-ribbon" class="hud-live-ribbon" aria-live="polite">
        <span id="hud-live-state" data-state="idle">● LIVE</span>
        <span id="hud-live-tool" class="hud-live-tool"></span>
      </div>
      <div id="hud-grid" class="hud-grid" role="grid" aria-label="JANIS modular HUD"></div>
    </div>

    <footer class="hud-foot">
      <span id="sheet-dots" class="sheet-dots"></span>
      <span id="foot-meta" class="foot-meta">ISOLE · GRIGLIA 3×3 · CLICK = FULL</span>
      <button type="button" id="term-toggle" class="chat-toggle term-toggle">[ TERM ]</button>
      <button type="button" id="chat-toggle" class="chat-toggle">[ CHAT ]</button>
      <span id="pause-badge" class="pause-badge hidden">◆ HOLD 10M</span>
    </footer>

    <aside id="hud-terminal" class="hud-terminal hidden" aria-label="Terminale HUD">
      <header class="hud-chat-head">
        <span>TERMINAL · SHELL</span>
        <select id="hud-term-shell" class="hud-term-shell" title="Shell">
          <option value="wsl" selected>WSL (brain)</option>
          <option value="win">Windows PS</option>
        </select>
        <button type="button" id="term-close" class="chat-close">✕</button>
      </header>
      <div id="hud-term-log" class="hud-term-log"></div>
      <form id="hud-term-form" class="hud-chat-form">
        <input id="hud-term-input" type="text" autocomplete="off" spellcheck="false" placeholder="comando…" />
        <button type="submit">RUN</button>
      </form>
    </aside>

    <aside id="hud-chat" class="hud-chat hidden" aria-label="Chat JANIS">
      <header class="hud-chat-head">
        <span>BRAIN · LIVE</span>
        <span id="chat-ws-status" class="chat-ws off">WS</span>
        <button type="button" id="chat-close" class="chat-close">✕</button>
      </header>
      <div id="hud-chat-log" class="hud-chat-log"></div>
      <form id="hud-chat-form" class="hud-chat-form">
        <input id="hud-chat-input" type="text" autocomplete="off" placeholder="Messaggio a JANIS…" />
        <button type="submit">INVIA</button>
      </form>
    </aside>
  </div>

  <script src="/kiosk-static/hud-viz.js?v=hudcli08"></script>
  <script src="/kiosk-static/hud-neural-live.js?v=hudcli08"></script>
  <script src="/kiosk-static/server-stage.js?v=hudcli08"></script>
  <script src="/kiosk-static/hud-chat.js?v=hudcli08"></script>
  <script src="/kiosk-static/hud-terminal.js?v=hudcli08"></script>
</body>
</html>
